name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.1-bin.zip -d /tmp
          /tmp/gradle-8.1/bin/gradle wrapper --gradle-version=8.1
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FloatingAI-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7